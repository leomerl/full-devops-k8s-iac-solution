apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: weave-gitops
  namespace: flux-system
spec:
  interval: 60m
  targetNamespace: weave-gitops
  chart:
    spec:
      chart: weave-gitops
      sourceRef:
        kind: HelmRepository
        name: ww-gitops
        namespace: flux-system
  install:
    createNamespace: true
  valuesFrom:
    - kind: Secret
      name: weave-gitops-admin
      valuesKey: passwordHash
      targetPath: adminUser.passwordHash
  values:
    adminUser:
      create: true
      username: admin
    service:
      type: NodePort
      port: 9001
      nodePort: 32002
