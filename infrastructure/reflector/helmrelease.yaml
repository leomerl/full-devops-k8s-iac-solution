apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: reflector
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: reflector
  chart:
    spec:
      chart: reflector
      version: ">=7.0.0 <8.0.0"
      sourceRef:
        kind: HelmRepository
        name: emberstack
        namespace: flux-system
  install:
    createNamespace: true
