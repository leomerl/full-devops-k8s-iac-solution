##################################################################
## Jenkins values.yaml Demo!!
## the real values is located in the argocd repo
## https://github.com/elevy99927/argo-demo-repo/tree/application
####################################################################
controller:
  admin:
    # -- Admin username created as a secret if `controller.admin.createSecret` is true
    username: "admin"
    # -- Admin password created as a secret if `controller.admin.createSecret` is true
    password: "Aa123456"
    jenkinsAdminEmail: "eyal@levys.co.il"

  serviceType: NodePort
  nodePort: 32001

  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - configuration-as-code:latest
    - job-dsl:latest
    - pipeline-stage-view:latest

  JCasC:
    configScripts:
      folders: |
        jobs:
          - script: >
              folder('team-1')
          - script: >
              folder('team-2')
      team-1-jobs: |
        jobs:
          - script: >
              pipelineJob('team-1/hello-newapp') {
                triggers {
                  scm('* * * * *')
                }
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/elevy99927/hello-newapp.git')
                        }
                        branches('*/argo-solution')
                      }
                    }
                    scriptPath('Jenkinsfile')
                  }
                }
              }