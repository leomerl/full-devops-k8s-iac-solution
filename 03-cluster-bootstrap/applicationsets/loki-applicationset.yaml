apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: loki
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - app: loki
            cluster: k8s-qa

  template:
    metadata:
      name: "{{.app}}-{{.cluster}}"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/elevy99927/argo-demo-repo.git
          targetRevision: application
          ref: values
        - repoURL: https://grafana.github.io/helm-charts
          chart: loki
          targetRevision: 6.30.0
          helm:
            valueFiles:
              - $values/{{.app}}/{{.cluster}}/loki-values.yaml
        - repoURL: https://grafana.github.io/helm-charts
          chart: promtail
          targetRevision: 6.16.6
          helm:
            valueFiles:
              - $values/{{.app}}/{{.cluster}}/promtail-values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
