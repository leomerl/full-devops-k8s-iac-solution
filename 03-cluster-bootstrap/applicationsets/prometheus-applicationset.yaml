apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: prometheus
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - app: prometheus
            cluster: k8s-qa

  template:
    metadata:
      name: "{{.app}}-{{.cluster}}"
    spec:
      project: default
      sources:
        - repoURL: https://prometheus-community.github.io/helm-charts
          chart: kube-prometheus-stack
          targetRevision: 72.3.0
          helm:
            valueFiles:
              - $values/{{.app}}/{{.cluster}}/values.yaml
        - repoURL: https://github.com/elevy99927/argo-demo-repo.git
          targetRevision: application
          ref: values 

      destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
