apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: temporal
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - app: temporal
            cluster: k8s-qa

  template:
    metadata:
      name: "{{.app}}-{{.cluster}}"
    spec:
      project: default
      sources:
        - repoURL: https://go.temporal.io/helm-charts
          chart: temporal
          targetRevision: 1.1.1
          helm:
            valueFiles:
              - $values/{{.app}}/{{.cluster}}/values.yaml
        - repoURL: https://github.com/elevy99927/argo-demo-repo.git
          targetRevision: application
          ref: values 
        - repoURL: https://github.com/elevy99927/argo-demo-repo.git
          targetRevision: application
          path: "{{.app}}/{{.cluster}}/secrets" # Reflactor Secrets

      destination:
        server: https://kubernetes.default.svc
        namespace: temporal
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
